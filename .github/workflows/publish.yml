name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check if version already published
        id: version_check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Already published: $NAME@$VER"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        run: npx -y npm@11 publish --access public --provenance --tag "${{ steps.dist_tag.outputs.tag }}"

      - name: Point latest at the newest prerelease until a stable exists
        if: steps.dist_tag.outputs.tag != 'latest'
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_LATEST=$(npm view "$NAME@latest" version 2>/dev/null || echo "")
          if [[ -z "$CURRENT_LATEST" || "$CURRENT_LATEST" == *-* ]]; then
            npx -y npm@11 dist-tag add "$NAME@$VERSION" latest
          fi
